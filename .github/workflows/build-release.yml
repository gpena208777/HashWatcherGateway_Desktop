name: Build And Publish Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Import Apple signing certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CODESIGN_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CODESIGN_P12_PASSWORD }}
      - name: Build macOS app bundle
        run: ./scripts/build_macos_release.sh
      - name: Build macOS installers
        env:
          MACOS_APP_SIGN_IDENTITY: ${{ secrets.MACOS_APP_SIGN_IDENTITY }}
          MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: ./scripts/package_macos_installers.sh
      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: HashWatcherGatewayDesktop-macos-installers
          path: |
            release/HashWatcherGatewayDesktop.dmg
            release/HashWatcherGatewayDesktop.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Windows app bundle
        shell: powershell
        run: .\scripts\build_windows_release.ps1
      - name: Show Windows dist output
        shell: powershell
        run: Get-ChildItem -Path .\dist -Recurse | Select-Object FullName
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress
      - name: Build Windows installer
        shell: powershell
        run: .\scripts\package_windows_installer.ps1
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: HashWatcherGatewayDesktop-windows-installer
          path: release/HashWatcherGatewayDesktop-Setup.exe

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/HashWatcherGatewayDesktop-macos-installers/HashWatcherGatewayDesktop.dmg
            release-assets/HashWatcherGatewayDesktop-macos-installers/HashWatcherGatewayDesktop.pkg
            release-assets/HashWatcherGatewayDesktop-windows-installer/HashWatcherGatewayDesktop-Setup.exe
